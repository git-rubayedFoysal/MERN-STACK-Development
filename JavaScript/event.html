<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1e1e1e;
      }

      #parent {
        width: 80vw;
        height: 50vh;
        margin-top: 50px;
        background-color: whitesmoke;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        border: 3px solid #3e3e3e;
        padding: 10px;
        cursor: pointer;
      }

      .child {
        width: 180px;
        height: 180px;
        color: whitesmoke;
        font-weight: bold;
        border-radius: 5px;
        border: 2px solid #1e1e1e;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="parent">
      <div id="child1" class="child" style="background-color: dodgerblue">
        Child 1
      </div>
      <div id="child2" class="child" style="background-color: coral">
        Child 2
      </div>
      <div id="child3" class="child" style="background-color: crimson">
        Child 3
      </div>
      <div id="child4" class="child" style="background-color: darkcyan">
        Child 4
      </div>
      <div id="child5" class="child" style="background-color: seagreen">
        Child 5
      </div>
    </div>

    <script src="./event.js"></script>
  </body>
</html>
